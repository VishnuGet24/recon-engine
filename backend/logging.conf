[loggers]
keys=root,recon

[handlers]
keys=consoleHandler,fileHandler

[formatters]
keys=standard

[logger_root]
level=INFO
handlers=consoleHandler

[logger_recon]
level=INFO
handlers=consoleHandler,fileHandler
qualname=recon
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=standard
args=(sys.stdout,)

[handler_fileHandler]
class=handlers.RotatingFileHandler
level=INFO
formatter=standard
args=('logs/backend.log', 'a', 10485760, 5)

[formatter_standard]
format=%(asctime)s %(levelname)s %(name)s %(message)s
