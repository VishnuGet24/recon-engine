<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recon Login</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      width: 100%;
      max-width: 380px;
      padding: 28px;
      border-radius: 12px;
      background: #111827;
      box-shadow: 0 10px 35px rgba(0,0,0,0.35);
      border: 1px solid #1f2937;
    }
    h1 {
      margin: 0 0 14px;
      font-size: 1.4rem;
    }
    p {
      margin: 0 0 18px;
      color: #9ca3af;
      font-size: 0.95rem;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.9rem;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #374151;
      background: #0b1220;
      color: #e2e8f0;
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 8px;
      padding: 11px;
      font-weight: 600;
      background: #2563eb;
      color: #fff;
      cursor: pointer;
    }
    .error {
      margin-bottom: 12px;
      padding: 10px;
      border-radius: 8px;
      background: #7f1d1d;
      border: 1px solid #b91c1c;
      color: #fee2e2;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <form class="card" method="post" action="/login" autocomplete="off">
    <h1>Recon Scanner Login</h1>
    <p>Session authentication with RBAC enforcement.</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <label for="username">Username or Email</label>
    <input id="username" name="username" type="text" maxlength="150" required>

    <label for="password">Password</label>
    <input id="password" name="password" type="password" required>

    <button type="submit">Sign In</button>
  </form>
</body>
</html>
